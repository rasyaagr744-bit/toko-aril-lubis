<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Aril Lubis</title>

<style>
body {font-family:Arial; margin:0; background:#f4f6f8}
header {background:#2e7d32; color:white; text-align:center; padding:20px}
.container {max-width:900px; margin:20px auto; background:white; padding:20px; border-radius:10px}
input {padding:8px; margin:5px; width:30%}
button {padding:8px 12px; margin:5px; background:#2e7d32; color:white; border:none; border-radius:5px}
table {width:100%; border-collapse:collapse; margin-top:10px}
th,td {border:1px solid #ddd; padding:10px}
th {background:#4caf50; color:white}
</style>
</head>

<body>

<header>
<h1>Toko Aril Lubis</h1>
<p>Daftar Harga Sembako</p>
</header>

<div class="container">

<h3>Tambah Produk</h3>
<input id="nama" placeholder="Nama barang">
<input id="satuan" placeholder="Satuan">
<input id="harga" placeholder="Harga">
<button onclick="tambah()">Simpan</button>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Satuan</th>
<th>Harga</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyECT9-DTl1fUqJBUFcTOUiN1z87VJwwtxgl9NsKFZ3fbSWlWsE31xcrNttXvqT8er2/exec";

async function load(){
let res = await fetch(API);
let data = await res.json();

let tbody = document.querySelector("tbody");
tbody.innerHTML="";

data.slice(1).forEach((row,i)=>{
tbody.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${row[0]}</td>
<td>${row[1]}</td>
<td>Rp ${row[2]}</td>
<td>
<button onclick="edit(${i})">Edit</button>
<button onclick="hapus(${i})">Hapus</button>
</td>
</tr>`;
});
}

async function tambah(){
let nama=document.getElementById("nama").value;
let satuan=document.getElementById("satuan").value;
let harga=document.getElementById("harga").value;

await fetch(API,{
method:"POST",
body:JSON.stringify({nama,satuan,harga})
});

load();
}

async function edit(i){
let nama=prompt("Nama baru:");
let satuan=prompt("Satuan baru:");
let harga=prompt("Harga baru:");

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"update",
row:i,
nama,
satuan,
harga
})
});

load();
}

async function hapus(i){
if(confirm("Hapus produk?")){
await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"delete",
row:i
})
});
load();
}
}

load();
</script>

</body>
</html>
